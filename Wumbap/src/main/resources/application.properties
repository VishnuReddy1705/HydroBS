spring.application.name=Wumbap

# ===========================================
# Datasource (override via environment variables in every non-local environment)
# ===========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/water_monitor_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema is owned by Flyway migrations. Default keeps the previously-working 'update'
# behavior; set DDL_AUTO=validate in production once entity<->migration parity is confirmed.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true

# ===========================================
# File upload limits (CSV meter-reading ingestion)
# ===========================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ===========================================
# CORS (comma-separated list of allowed frontend origins)
# ===========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# ===========================================
# JWT Configuration (ALWAYS override the secret in production)
# ===========================================
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=${JWT_EXPIRATION_MS:900000}

# ===========================================
# Bootstrap Super Admin (override in production; password is never logged)
# ===========================================
app.super-admin.email=${SUPER_ADMIN_EMAIL:admin@gmail.com}
app.super-admin.password=${SUPER_ADMIN_PASSWORD:admin}

# ===========================================
# Actuator (health probe only)
# ===========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# ===========================================
# Razorpay API Credentials
# ===========================================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_sample_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:sample_secret_key}
